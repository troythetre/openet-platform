services:
  - type: web
    name: openet-platform
    runtime: python
    buildCommand: pip install -r backend/requirements.txt && cd backend && python database.py
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENET_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
